; PlatformIO Project Configuration File
[platformio]
libdeps_dir = .pio/libs
src_dir = .
default_envs = release

[env]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git#60d6ae8
platform_packages =
  framework-arduinopico @ https://github.com/earlephilhower/arduino-pico/releases/download/3.9.3/rp2040-3.9.3.zip
  tool-openocd
board_build.core = earlephilhower
lib_deps =
  knx=https://github.com/thelsing/knx.git
  SPI
  PlayRtttl
  ArduinoLog

board_build.f_cpu = 125000000L
build_flags =
  -DMASK_VERSION=0x07B0        ; Normal Device TP1 = Twisted Pair (cable)
  -DKNX_FLASH_SIZE=0x8000      ; default = 0x1000 = 4KiB; must be multiple of 4096
  ;-DKNX_FLASH_OFFSET=0xF4000  ; default = 0x180000 = 1.5MiB; must be multiple of 4096
  -DUSE_TP_RX_QUEUE            ; Improved performance on TP by using a queue instead of immediate frame processing
  -DPIO_FRAMEWORK_ARDUINO_ENABLE_RTTI  ; according to rp2040_arduino_platform.cpp: RTTI must be set to enabled in the board options
  ;-DDBG_TRACE
  ;-DDEBUG_TP_FRAMES
  -DKNX_NO_AUTOMATIC_GLOBAL_INSTANCE
  -Wuninitialized
  -Wunused-variable
  -Wno-unknown-pragmas
  ;-DUSE_RP2040_EEPROM_EMULATION
  ;-DUSE_RP2040_LARGE_EEPROM_EMULATION
monitor_port = COM4
monitor_speed = 115200

[env:debug]
board = rpipico
framework = arduino
build_type = debug
test_ignore = *
build_src_filter = +<*> -<test/>
;debug_extra_cmds = 
;  set output-radix 16
debug_build_flags = 
  -O0 
  -ggdb3 
debug_tool = custom
debug_server =
  $PLATFORMIO_CORE_DIR/packages/tool-openocd/bin/openocd
  -s
  $PLATFORMIO_CORE_DIR/packages/tool-openocd/share/openocd/scripts
  -f
  interface/ftdi/jtag-lock-pick_tiny_2.cfg
  -c
  transport select swd
  -c
  set USE_CORE 0
  -f
  target/rp2040.cfg
  -c
  gdb_report_data_abort enable
  -c
  adapter speed 1000
  -c
  adapter srst delay 200
  -c
  init
upload_protocol = custom
extra_scripts = pre:custom_debug.py

[env:release]
board = rpipico
framework = arduino
test_ignore = *
upload_protocol = mbed
build_src_filter = +<*> -<test/>
; ArduinoLog bug - does not call va_end() which could lead to undefined
; behaviour, disable logging in release build until this is fixed in mainstream
build_flags = ${env.build_flags} -DDKNX_UP_BUZZER_DISABLE_LOGGING

[env:test]
platform = native
test_framework = googletest
build_flags =
  -Isrc
  -Itest/stub
lib_deps = googletest

[env:check]
board = rpipico
framework = arduino
check_tool = cppcheck
check_flags = 
 cppcheck: --suppress=*:.pio/*
 cppcheck: --suppress=*:*/.pio/*
check_skip_packages = yes
check_src_filters = +<src/> -<.pio/> -<test/>